version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: orchagent
      POSTGRES_PASSWORD: orchagent
      POSTGRES_DB: orchagent
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orchagent-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - orchagent-net

volumes:
  pg_data:
  redis_data:

networks:
  orchagent-net:
    driver: bridge
